<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Golf Manager">
<meta name="theme-color" content="#1a4731">
<title>⛳ Golf Manager</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --green: #1a4731; --green2: #276749; --green3: #d1fae5;
    --gray: #6b7280; --light: #f0fdf4; --white: #ffffff;
    --border: #e5e7eb; --red: #ef4444; --amber: #f59e0b;
  }
  body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: var(--light); min-height: 100vh; }

  /* HEADER */
  #header {
    background: var(--green); color: white; padding: 14px 16px 10px;
    display: flex; justify-content: space-between; align-items: flex-end;
    position: sticky; top: 0; z-index: 100;
    padding-top: calc(14px + env(safe-area-inset-top));
  }
  #header h1 { font-size: 17px; font-weight: 800; letter-spacing: 0.5px; }
  #header .sub { font-size: 11px; opacity: 0.55; margin-top: 1px; }
  #toast { font-size: 12px; background: var(--green2); padding: 4px 10px; border-radius: 20px; display: none; }
  #toast.show { display: block; }

  /* NAV */
  #nav {
    display: flex; background: white; border-bottom: 1.5px solid var(--green3);
    overflow-x: auto; position: sticky; top: calc(54px + env(safe-area-inset-top)); z-index: 99;
  }
  #nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex: 0 0 auto; min-width: 58px; padding: 8px 4px 6px; border: none; background: white;
    color: var(--gray); font-size: 9.5px; cursor: pointer; display: flex;
    flex-direction: column; align-items: center; gap: 2px; transition: all 0.15s;
  }
  .nav-btn .ico { font-size: 17px; }
  .nav-btn.active { background: var(--green); color: white; }

  /* CONTENT */
  #content { padding: 14px 14px calc(20px + env(safe-area-inset-bottom)); max-width: 540px; margin: 0 auto; }

  /* CARDS */
  .card { background: white; border-radius: 12px; padding: 14px; border: 1px solid var(--border); margin-bottom: 10px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 10px; }

  /* HOME */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .stat-card { background: var(--light); border-radius: 10px; padding: 12px; }
  .stat-label { font-size: 11px; color: var(--gray); }
  .stat-val { font-size: 22px; font-weight: 800; color: var(--green); margin-top: 2px; }
  .stat-sub { font-size: 10px; color: var(--gray); margin-top: 1px; }

  .next-round { background: var(--green); color: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .next-round .label { font-size: 11px; opacity: 0.65; margin-bottom: 4px; }
  .next-round .name { font-size: 17px; font-weight: 800; }
  .next-round .detail { font-size: 12px; opacity: 0.75; margin-top: 4px; }

  /* FORM */
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: var(--gray); margin-bottom: 3px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: inherit; background: white; color: #111;
    -webkit-appearance: none; appearance: none;
  }
  .field textarea { min-height: 60px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--green); border-color: transparent; }

  /* BUTTONS */
  .btn-primary {
    width: 100%; background: var(--green); color: white; border: none; border-radius: 10px;
    padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    margin-top: 6px;
  }
  .btn-sm {
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    border: 1px solid var(--border); background: white; font-family: inherit;
  }
  .btn-danger { background: #fee2e2; border-color: #fca5a5; color: var(--red); }

  /* SCORE LIST */
  .round-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .round-item:last-child { border-bottom: none; }
  .round-name { font-size: 13px; font-weight: 600; }
  .round-meta { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .score-badge { font-size: 18px; font-weight: 800; color: var(--green); min-width: 42px; text-align: right; }
  .over-badge { font-size: 11px; color: var(--gray); text-align: right; margin-top: 1px; }

  /* SCHED */
  .sched-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .sched-item:last-child { border-bottom: none; }
  .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .status-예정 { background: #dbeafe; color: #1d4ed8; }
  .status-완료 { background: #d1fae5; color: #065f46; }
  .status-취소 { background: #fee2e2; color: #991b1b; }

  /* CLUB */
  .club-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .club-item:last-child { border-bottom: none; }
  .club-name { font-size: 13px; font-weight: 600; }
  .club-dist { font-size: 16px; font-weight: 800; color: var(--green); }
  .club-model { font-size: 11px; color: var(--gray); }

  /* LOADING */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--green3); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap { text-align: center; padding: 40px 20px; color: var(--gray); }
  .empty { text-align: center; color: var(--gray); padding: 30px 20px; }
  .empty .ico { font-size: 40px; margin-bottom: 8px; }

  /* TABS within page */
  .seg { display: flex; background: var(--light); border-radius: 8px; padding: 3px; margin-bottom: 12px; }
  .seg button { flex: 1; padding: 6px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; background: transparent; color: var(--gray); font-family: inherit; }
  .seg button.on { background: white; color: var(--green); font-weight: 700; box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  /* ERROR */
  .err { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--red); margin-bottom: 10px; }
</style>
</head>
<body>

    <div id="header-title">⛳ GOLF MANAGER</div>

<script>
// ============================================================
// CONFIG — Notion API (Claude-in-Claude로 Notion MCP 호출)
// ============================================================
const NOTION_TOKEN_PLACEHOLDER = "NOTION_MCP"; // MCP 통해 접근 (직접 토큰 불필요)

// 노션 데이터베이스 IDs
const DB = {
  rounds:   "266b1c60-6a2b-4e82-8838-7190385e1acd",  // collection URL
  schedule: "4760e1e5-8d2c-4d71-9561-a3d21847ac21",
  practice: "9693dd93-3b36-4bfc-82a0-43e1a1dc1c31",

// ============================================================
// STATE
// ============================================================
const State = {
  tab: "home",
  rounds: null,
  schedule: null,
  clubs: null,
  practice: null,
  loading: {},
  error: null,
};

// ============================================================
// NOTION API via Claude (AI-powered artifact)
// ============================================================
async function notionQuery(collectionId, sorts = []) {
  const prompt = `Using Notion MCP tool, search ALL pages in data source collection://${collectionId}. Return JSON array of page properties. Sort by date descending if available. Return ONLY a JSON array, no markdown, no explanation.`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: "You are a data retrieval assistant. Return ONLY raw JSON arrays, no markdown code blocks, no explanation text whatsoever.",
      messages: [{ role: "user", content: prompt }],
      mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion" }]
    })
  });
  const data = await res.json();
  // Extract text from response
  const texts = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  // Find JSON array
  const match = texts.match(/\[[\s\S]*\]/);
  if (!match) return [];
  try { return JSON.parse(match[0]); } catch { return []; }
}

async function notionUpdatePage(pageId, properties) {
  const propStr = JSON.stringify(properties);
  const prompt = `Using Notion MCP tool, update page ${pageId} with these properties: ${propStr}. Confirm when done.`;
  await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 200,
      messages: [{ role: "user", content: prompt }],
      mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion" }]
    })
  });
}

async function notionCreatePage(collectionId, properties) {
  const propStr = JSON.stringify(properties);
  const prompt = `Using Notion MCP tool, create a new page in data source collection://${collectionId} with these properties: ${propStr}. Return the new page ID only.`;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 200,
      messages: [{ role: "user", content: prompt }],
      mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion" }]
    })
  });
  const data = await res.json();

}

// ============================================================
// DATE UTILITIES — BUG FIX #2: 날짜 처리
// ============================================================
function today() {
  // 로컬 시간 기준 YYYY-MM-DD (UTC 변환 버그 방지)
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function parseLocalDate(isoStr) {
  if (!isoStr) return null;
  // ISO datetime을 로컬 날짜로 파싱 (UTC offset 버그 방지)
  const s = isoStr.split('T')[0]; // "2026-03-21"
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d); // 로컬 시간 기준
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = parseLocalDate(isoStr);
  if (!d) return '';
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

function formatDateFull(isoStr) {
  if (!isoStr) return '';
  const d = parseLocalDate(isoStr);
  if (!d) return '';
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} (${days[d.getDay()]})`;
}

function isUpcoming(isoStr) {
  // BUG FIX #1: 다음 라운드 판정 — 오늘 포함 미래만
  if (!isoStr) return false;
  const d = parseLocalDate(isoStr);
  if (!d) return false;
  const t = new Date(); t.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return d >= t;
}

function isPast(isoStr) {
  if (!isoStr) return false;
  const d = parseLocalDate(isoStr);
  if (!d) return false;
  const t = new Date(); t.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return d < t;
}

// ============================================================
// UI HELPERS
// ============================================================
const $ = id => document.getElementById(id);
const TABS = [
  { id: "home",  ico: "🏠", label: "홈" },
  { id: "score", ico: "🏆", label: "스코어" },
  { id: "clubs", ico: "🪄", label: "클럽" },
  { id: "sched", ico: "📅", label: "일정" },
  { id: "prac",  ico: "📓", label: "연습" },
  { id: "stats", ico: "📊", label: "통계" },
];

function renderNav() {
  $("nav").innerHTML = TABS.map(t =>
    `<button class="nav-btn ${State.tab === t.id ? 'active' : ''}" onclick="setTab('${t.id}')">
      <span class="ico">${t.ico}</span>${t.label}
    </button>`
  ).join('');
}

function showToast(msg = "저장됨") {
  const el = $("toast");
  el.textContent = "✓ " + msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

function loading(key) {
  return `<div class="loading-wrap"><div class="spinner"></div><div style="margin-top:10px;font-size:13px">로딩 중...</div></div>`;
}

function setTab(id) {
  State.tab = id;
  renderNav();
  renderContent();
}

// ============================================================
// RENDER CONTENT
// ============================================================
function renderContent() {
  const c = $("content");
  switch (State.tab) {
    case "home":  c.innerHTML = renderHome(); break;
    case "score": c.innerHTML = renderScore(); break;
    case "clubs": c.innerHTML = renderClubs(); break;
    case "sched": c.innerHTML = renderSched(); break;
    case "prac":  c.innerHTML = renderPrac(); break;
    case "stats": c.innerHTML = renderStats(); break;
  }
}

// ============================================================
// HOME TAB
// ============================================================
function renderHome() {
  const rounds = State.rounds || [];
  const sched = State.schedule || [];
  
  // 다음 라운드: 상태가 "예정"이고 날짜가 오늘 이후인 것만
  // BUG FIX #1: isPast 체크로 지난 라운드 제외
  const upcoming = sched
    .filter(s => s.status === "예정" && isUpcoming(s.date))
    .sort((a, b) => (a.date || "").localeCompare(b.date || ""))
    [0];

  const avgScore = rounds.length
    ? Math.round(rounds.reduce((s, r) => s + (r.총타수 || 0), 0) / rounds.filter(r=>r.총타수).length)
    : null;
  const lastRound = rounds.sort((a,b) => (b.date||"").localeCompare(a.date||""))[0];

  let html = ``;

  // 다음 라운드 카드
  if (upcoming) {
    html += `<div class="next-round">
      <div class="label">🗓 다음 라운드</div>
      <div class="name">${upcoming.name || '라운드'}</div>
      <div class="detail">${formatDateFull(upcoming.date)}${upcoming.course ? ' · ' + upcoming.course : ''}${upcoming.partner ? '<br>👥 ' + upcoming.partner : ''}</div>
    </div>`;
  } else {
    html += `<div class="card" style="text-align:center;color:var(--gray);padding:16px">
      <div style="font-size:24px">⛳</div>
      <div style="font-size:13px;margin-top:6px">예정된 라운드 없음</div>
      <div style="font-size:11px;margin-top:4px">일정 탭에서 추가해보세요</div>
    </div>`;
  }

  // 통계 카드
  html += `<div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">평균 스코어</div>
      <div class="stat-val">${avgScore || '—'}</div>
      <div class="stat-sub">${rounds.filter(r=>r.총타수).length}라운드 평균</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">최근 라운드</div>
      <div class="stat-val">${lastRound ? (lastRound.총타수 || '—') : '—'}</div>
      <div class="stat-sub">${lastRound ? formatDate(lastRound.date) : '기록 없음'}</div>
    </div>
  </div>`;

  // 최근 스코어 목록
  if (rounds.length > 0) {
    html += `<div class="card">
      <div class="card-title">최근 라운드</div>`;
    rounds.slice(0,3).forEach(r => {
      html += `<div class="round-item">
        <div>
          <div class="round-name">${r.name || '라운드'}</div>
          <div class="round-meta">${formatDate(r.date)}${r.course ? ' · ' + r.course : ''}</div>
        </div>
        <div style="text-align:right">
          <div class="score-badge">${r.총타수 || '—'}</div>
          <div class="over-badge">${r.파대비 != null ? (r.파대비 > 0 ? '+' + r.파대비 : r.파대비) : ''}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (State.rounds === null) {
    html = `${loading()}`;
    loadHomeData();
  }

  return html;
}

async function loadHomeData() {
  // 데이터 로딩 — 실제 앱에서는 Claude API 통해 노션 데이터 가져옴
  // 여기서는 로컬 캐시 우선 사용
  try {
    const cached = localStorage.getItem('golf_rounds');
    if (cached) State.rounds = JSON.parse(cached);
    else State.rounds = [];
    
    const cachedS = localStorage.getItem('golf_schedule');
    if (cachedS) State.schedule = JSON.parse(cachedS);
    else State.schedule = [];
    
    renderContent();
  } catch(e) {
    State.rounds = [];
    State.schedule = [];
    renderContent();
  }
}

// SCORE TAB
// ============================================================

          <div class="round-meta">${formatDate(r.date)}${r.course ? ' · ' + r.course : ''}</div>
        </div>
        <div style="text-align:right">
          <div class="score-badge">${r.총타수 || '—'}</div>
          <div class="over-badge">${r.파대비 != null ? (r.파대비 >= 0 ? '+' + r.파대비 : r.파대비) : ''}</div>
        </div>
      </div>`;
    });
    html += `</div>`;

  return html;

async function saveRound() {
  const name = $("r-name").value.trim() || "라운드";
  // BUG FIX #2: date input의 value를 그대로 사용 (YYYY-MM-DD)
  // new Date() 를 거치면 timezone 오프셋으로 날짜가 밀림 → 직접 string 사용
  const dateStr = $("r-date").value; // e.g. "2026-03-21"
  const score = parseInt($("r-score").value) || 0;
  const par = parseInt($("r-par").value) || 72;
  const putt = parseInt($("r-putt").value) || 0;
  const fw = parseInt($("r-fw").value) || 0;
  const gir = parseInt($("r-gir").value) || 0;
  const pen = parseInt($("r-pen").value) || 0;
  const weather = $("r-weather").value;
  const memo = $("r-memo").value.trim();

  const round = {
    id: Date.now().toString(),
    name, date: dateStr, course: $("r-course").value.trim(),
    총타수: score, 파: par, 파대비: score - par,
    퍼트수: putt, 페어웨이안착: fw, GIR: gir, 벌타: pen,
    날씨: weather, 메모: memo,
  };

  // 로컬 저장
  const rounds = State.rounds || [];
  rounds.unshift(round);
  State.rounds = rounds;
  localStorage.setItem('golf_rounds', JSON.stringify(rounds));
  showToast("라운드 저장됨");
  renderContent();
}

  { id: '5u',  name: '5U',       dist: 0, model: 'TaylorMade QI35' },
  { id: '5i',  name: '5i',       dist: 0, model: 'Ping' },
  { id: '6i',  name: '6i',       dist: 0, model: 'Ping' },
  { id: '7i',  name: '7i',       dist: 0, model: 'Ping' },
  { id: '8i',  name: '8i',       dist: 0, model: 'Ping' },

function getClubs() {
  try {
    const saved = localStorage.getItem('golf_clubs');
    return saved ? JSON.parse(saved) : DEFAULT_CLUBS;
  } catch { return DEFAULT_CLUBS; }
}

function renderClubs() {
  const clubs = getClubs();
  
  let html = `<div class="card">
    <div class="card-title">내 클럽 구성</div>`;
  
  clubs.forEach(c => {
    html += `<div class="club-item">
      <div>
        <div class="club-name">${c.name}</div>
        <div class="club-model">${c.model || ''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div>
          <div class="club-dist">${c.dist ? c.dist + 'm' : '—'}</div>
        </div>
        <button class="btn-sm" onclick="editClub('${c.id}')">수정</button>
      </div>
    </div>`;
  });
  
  html += `</div>`;
  
  // 편집 폼
  html += `<div class="card" id="club-edit-card" style="display:none">
    <div class="card-title">클럽 거리 수정</div>
    <div class="field"><label>클럽명</label><input id="ce-name" type="text" readonly style="background:#f9fafb"></div>
    <div class="field"><label>평균 비거리 (m)</label><input id="ce-dist" type="number" placeholder="230"></div>
    <div class="field"><label>클럽 모델</label><input id="ce-model" type="text" placeholder="TaylorMade Qi10"></div>
    <input type="hidden" id="ce-id">
    <button class="btn-primary" onclick="saveClub()">저장</button>
  </div>`;
  
  return html;
}

function editClub(id) {
  const clubs = getClubs();
  const c = clubs.find(x => x.id === id);
  if (!c) return;
  $("ce-id").value = id;
  $("ce-name").value = c.name;
  $("ce-dist").value = c.dist || '';
  $("ce-model").value = c.model || '';
  $("club-edit-card").style.display = 'block';
  $("club-edit-card").scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function saveClub() {
  const id = $("ce-id").value;
  const clubs = getClubs();
  const idx = clubs.findIndex(x => x.id === id);
  if (idx >= 0) {
    clubs[idx].dist = parseInt($("ce-dist").value) || 0;
    clubs[idx].model = $("ce-model").value.trim();
    localStorage.setItem('golf_clubs', JSON.stringify(clubs));
    showToast("클럽 정보 저장됨");
    renderContent();
  }
}

// SCHEDULE TAB
// ============================================================
function renderSched() {
  const sched = State.schedule || [];
  
  let html = `<div class="card">
    <div class="card-title">새 일정 추가</div>
    <div class="field"><label>일정명</label><input id="s-name" type="text" placeholder="조관희 오픈"></div>
    <div class="field"><label>날짜</label><input id="s-date" type="date" value="${today()}"></div>
    <div class="field"><label>골프장</label><input id="s-course" type="text" placeholder="테디밸리골프앤리조트"></div>
    <div class="field"><label>동반자</label><input id="s-partner" type="text" placeholder="이름 쉼표로 구분"></div>
    <div class="field">
      <label>상태</label>
      <select id="s-status">
        <option value="예정">예정</option>
        <option value="완료">완료</option>
        <option value="취소">취소</option>
      </select>
    </div>
    <button class="btn-primary" onclick="saveSched()">💾 저장하기</button>
  </div>`;

  if (sched.length > 0) {
    // 예정/완료/취소 그룹 분리
    const upcoming = sched.filter(s => s.status === "예정").sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    const past = sched.filter(s => s.status !== "예정").sort((a,b)=>(b.date||"").localeCompare(a.date||""));

    if (upcoming.length > 0) {
      html += `<div class="card"><div class="card-title">예정된 라운드</div>`;
      upcoming.forEach(s => {
        html += renderSchedItem(s);
      });
      html += `</div>`;
    }

    if (past.length > 0) {
      html += `<div class="card"><div class="card-title">지난 라운드</div>`;
      past.forEach(s => {
        html += renderSchedItem(s);
      });
      html += `</div>`;
    }
  }

  return html;
}

function renderSchedItem(s) {
  return `<div class="sched-item">
    <div>
      <div style="font-size:13px;font-weight:600">${s.name || '일정'}</div>
      <div style="font-size:11px;color:var(--gray);margin-top:2px">${formatDateFull(s.date)}${s.course ? '<br>' + s.course : ''}${s.partner ? '<br>👥 ' + s.partner : ''}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <span class="status-badge status-${s.status}">${s.status}</span>
      ${s.status === "예정" ? `<button class="btn-sm" onclick="markSchedDone('${s.id}')">완료</button>` : ''}
    </div>
  </div>`;
}

async function saveSched() {
  // BUG FIX #2: 날짜 문자열 직접 저장
  const dateStr = $("s-date").value;
  const item = {
    id: Date.now().toString(),
    name: $("s-name").value.trim() || "라운드",
    date: dateStr,
    course: $("s-course").value.trim(),
    partner: $("s-partner").value.trim(),
    status: $("s-status").value,
  };
  const sched = State.schedule || [];
  sched.unshift(item);
  State.schedule = sched;
  localStorage.setItem('golf_schedule', JSON.stringify(sched));
  showToast("일정 저장됨");
  renderContent();
}

function markSchedDone(id) {
  // BUG FIX #1: 완료 처리 — 이 일정은 다음 라운드에서 제외됨
  const sched = State.schedule || [];
  const idx = sched.findIndex(s => s.id === id);
  if (idx >= 0) {
    sched[idx].status = "완료";
    State.schedule = sched;
    localStorage.setItem('golf_schedule', JSON.stringify(sched));
    showToast("완료 처리됨");
    renderContent();
  }
}

// ============================================================
// STATS TAB
// ============================================================
function renderStats() {
  const rounds = (State.rounds || []).filter(r => r.총타수 > 0);
  const clubs = getClubs().filter(c => c.dist > 0);

  if (rounds.length === 0) {
    return `<div class="card"><div class="empty"><div class="ico">📊</div><div>라운드를 기록하면 통계가 표시됩니다</div></div></div>`;
  }

  const sorted = [...rounds].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const scores = sorted.map(r => r.총타수);
  const best = Math.min(...scores);
  const worst = Math.max(...scores);
  const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  const latest = sorted[sorted.length-1];
  const prev   = sorted[sorted.length-2];
  const trend  = prev ? latest.총타수 - prev.총타수 : null;

  // Score trend mini chart using SVG
  const W = 280, H = 80, PAD = 10;
  const minS = best - 3, maxS = worst + 3;
  const pts = sorted.slice(-8).map((r,i,arr) => {
    const x = PAD + (i / Math.max(arr.length-1, 1)) * (W - PAD*2);
    const y = H - PAD - ((r.총타수 - minS) / (maxS - minS)) * (H - PAD*2);
    return [Math.round(x), Math.round(y)];
  });
  const polyline = pts.map(p => p.join(',')).join(' ');
  const labels = sorted.slice(-8).map(r => formatDate(r.date).replace('월 ','/'). replace('일',''));

  let svgChart = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
    <polyline points="${polyline}" fill="none" stroke="#1a4731" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  pts.forEach((p,i) => {
    svgChart += `<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="#1a4731"/>
    <text x="${p[0]}" y="${p[1]-8}" font-size="9" fill="#6b7280" text-anchor="middle">${sorted.slice(-8)[i].총타수}</text>`;
  });
  svgChart += `</svg>`;

  // Best/Worst/Avg par breakdown
  const withPar = rounds.filter(r => r.파 > 0);
  const avgOver = withPar.length ? Math.round(withPar.reduce((s,r)=>s+(r.파대비||0),0)/withPar.length*10)/10 : null;

  let html = `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">최고 스코어</div><div class="stat-val" style="color:#276749">${best}</div><div class="stat-sub">베스트</div></div>
    <div class="stat-card"><div class="stat-label">평균 스코어</div><div class="stat-val">${avg}</div><div class="stat-sub">${rounds.length}라운드</div></div>
    <div class="stat-card"><div class="stat-label">최근 스코어</div><div class="stat-val">${latest.총타수}</div><div class="stat-sub">${trend !== null ? (trend > 0 ? '▲'+trend+' 증가' : trend < 0 ? '▼'+Math.abs(trend)+' 향상' : '변동 없음') : formatDate(latest.date)}</div></div>
    <div class="stat-card"><div class="stat-label">평균 파대비</div><div class="stat-val">${avgOver !== null ? '+'+avgOver : '—'}</div><div class="stat-sub">오버파</div></div>
  </div>

  <div class="card">
    <div class="card-title">스코어 추이 (최근 8라운드)</div>
    ${svgChart}
  </div>`;

  // Putting stats
  const withPutt = rounds.filter(r => r.퍼트수 > 0);
  if (withPutt.length > 0) {
    const avgPutt = Math.round(withPutt.reduce((s,r)=>s+r.퍼트수,0)/withPutt.length*10)/10;
    html += `<div class="card">
      <div class="card-title">퍼팅 & 정확도</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div class="stat-card"><div class="stat-label">평균 퍼트</div><div class="stat-val">${avgPutt}</div></div>`;
    const withFW = rounds.filter(r => r.페어웨이안착 > 0);
    const withGIR = rounds.filter(r => r.GIR > 0);
    if (withFW.length) {
      const avgFW = Math.round(withFW.reduce((s,r)=>s+r.페어웨이안착,0)/withFW.length*10)/10;
      html += `<div class="stat-card"><div class="stat-label">평균 페어웨이</div><div class="stat-val">${avgFW}</div></div>`;
    }
    if (withGIR.length) {
      const avgGIR = Math.round(withGIR.reduce((s,r)=>s+r.GIR,0)/withGIR.length*10)/10;
      html += `<div class="stat-card"><div class="stat-label">평균 GIR</div><div class="stat-val">${avgGIR}</div></div>`;
    }
    html += `</div></div>`;
  }

  // Club distances
  if (clubs.length > 0) {
    html += `<div class="card"><div class="card-title">클럽 비거리 요약</div>`;
    const maxDist = Math.max(...clubs.map(c=>c.dist));
    clubs.forEach(c => {
      const pct = Math.round(c.dist / maxDist * 100);
      html += `<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
          <span style="font-weight:600">${c.name}</span><span style="color:var(--green);font-weight:700">${c.dist}m</span>
        </div>
        <div style="background:#e5e7eb;border-radius:4px;height:6px">
          <div style="background:var(--green);width:${pct}%;height:6px;border-radius:4px"></div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  return html;
}

// ============================================================
// NOTION SYNC (노션 MCP 연동)
// ============================================================
async function syncFromNotion() {
  showToast("노션 동기화 중...");
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        system: `You retrieve Notion database records and return them as clean JSON.
Return ONLY a JSON object with keys: rounds, schedule.
No markdown, no explanation, no code blocks.
rounds: array of {id, name, date (YYYY-MM-DD from date:날짜:start), course (골프장), 총타수, 파, 파대비, 퍼트수, GIR, 페어웨이안착, 벌타, 날씨, 메모}
schedule: array of {id, name (일정명), date (YYYY-MM-DD from date:날짜:start), course (골프장), partner (동반자), status (상태)}
For dates: always use only the date part YYYY-MM-DD, never include time or timezone.
Extract the page URL last segment as the id field.`,
        messages: [{
          role: "user",
          content: `Search all pages in these two Notion data sources and return them as JSON:
1. Rounds: collection://266b1c60-6a2b-4e82-8838-7190385e1acd (라운드 스코어)
2. Schedule: collection://4760e1e5-8d2c-4d71-9561-a3d21847ac21 (골프 일정)
Return ONLY the JSON object.`
        }],
        mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion" }]
      })
    });
    const data = await res.json();
    const textBlocks = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    const match = textBlocks.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("No JSON found");
    const parsed = JSON.parse(match[0]);

    if (parsed.rounds) {
      State.rounds = parsed.rounds;
      localStorage.setItem('golf_rounds', JSON.stringify(parsed.rounds));
    }
    if (parsed.schedule) {
      State.schedule = parsed.schedule;
      localStorage.setItem('golf_schedule', JSON.stringify(parsed.schedule));
    }
    showToast("동기화 완료!");
    renderContent();
  } catch(e) {
    showToast("동기화 실패 - 로컬 데이터 사용");
  }
}

  const d = new Date();
  $("header-date").textContent = `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} (${days[d.getDay()]})`;

  // 로컬 캐시 로드
  try {
    const r = localStorage.getItem('golf_rounds');
    State.rounds = r ? JSON.parse(r) : [];
    const s = localStorage.getItem('golf_schedule');
    State.schedule = s ? JSON.parse(s) : [];
  } catch {
    State.rounds = [];
    State.schedule = [];
  }

  renderNav();
  renderContent();

  // Service Worker 등록
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}
